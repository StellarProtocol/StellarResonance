name: release
# Builds the launcher for Windows + Linux and publishes to the MinIO `stellar` bucket
# so the launcher's self-update check (stellar/launcher.json) can see new versions.
# Runs on hosted runners — the launcher has NO game-interop dependency, so unlike the
# framework's release workflow this is fully automatable.
#
# Fixed object names (no version in the filename) mean only the CURRENT version is ever
# kept in the bucket — each release overwrites the previous binaries + launcher.json.
#
# The resolved version is the SINGLE source of truth: it's stamped into the binary via
# -p:Version (HomeViewModel.LauncherVersion reads it back) AND written into launcher.json,
# so the two can never disagree. No code edit is needed before a release.
#
# Trigger: push a tag v* (mirrors the framework repo). A plain version (v1.2.3) routes to
# the STABLE channel; a prerelease tag (v1.2.3-rc1) routes to TESTING. Or run manually with
# version + channel inputs — an explicit workflow_dispatch input always wins over the tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Launcher version, e.g. 1.0.0 (must match LauncherVersion in code)"
        required: true
      channel:
        description: "Release channel"
        type: choice
        options: [stable, testing]
        default: stable

permissions:
  contents: write   # create/delete GitHub Releases + tags
  actions: write    # delete old workflow runs (keep storage at current-only)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Production
    # Hoisted from secrets so the code-sign step's `if:` can test it — the `secrets`
    # context is NOT allowed in step/job `if:` conditions (the workflow fails to parse:
    # "Unrecognized named-value: 'secrets'"), but job-level `env` is available there.
    env:
      CODE_SIGN_CERT: ${{ secrets.CODE_SIGN_CERT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve version + channel
        id: ver
        shell: bash
        run: |
          V="${{ github.event.inputs.version }}"
          [ -n "$V" ] || V="${GITHUB_REF_NAME#v}"
          CH="${{ github.event.inputs.channel }}"
          # Tag pushes carry no channel input: a prerelease version (e.g. 1.2.3-rc1) routes to
          # testing, a plain version to stable. An explicit workflow_dispatch input always wins.
          if [ -z "$CH" ]; then case "$V" in *-*) CH=testing;; *) CH=stable;; esac; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "channel=$CH" >> "$GITHUB_OUTPUT"
          echo "resolved: version=$V channel=$CH"

      - name: Publish win-x64 (self-contained, single file)
        run: >
          dotnet publish src/StellarLauncher.App -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.ver.outputs.version }}
          -o publish/win-x64

      - name: Code-sign Windows executable
        if: ${{ env.CODE_SIGN_CERT != '' }}
        env:
          CERT_PFX_B64: ${{ secrets.CODE_SIGN_CERT }}
          CERT_PWD: ${{ secrets.CODE_SIGN_PASSWORD }}
        run: |
          sudo apt-get install -y osslsigncode
          echo "$CERT_PFX_B64" | base64 -d > cert.pfx
          osslsigncode sign \
            -pkcs12 cert.pfx \
            -pass "$CERT_PWD" \
            -n "Stellar Launcher" \
            -t http://timestamp.digicert.com \
            -in  publish/win-x64/StellarLauncher.App.exe \
            -out publish/win-x64/StellarLauncher.App.signed.exe
          mv publish/win-x64/StellarLauncher.App.signed.exe publish/win-x64/StellarLauncher.App.exe
          rm cert.pfx

      - name: Publish linux-x64 (self-contained, single file)
        run: >
          dotnet publish src/StellarLauncher.App -c Release -r linux-x64
          --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.ver.outputs.version }}
          -o publish/linux-x64

      - name: Bundle Linux desktop integration (icon + .desktop + install.sh)
        run: |
          cp packaging/linux/install.sh   publish/linux-x64/install.sh
          cp packaging/linux/uninstall.sh publish/linux-x64/uninstall.sh
          cp packaging/linux/stellar-launcher.desktop publish/linux-x64/stellar-launcher.desktop
          cp src/StellarLauncher.App/Assets/stellar.png publish/linux-x64/stellar-launcher.png
          chmod +x publish/linux-x64/install.sh publish/linux-x64/uninstall.sh

      - name: Zip artifacts
        run: |
          (cd publish/win-x64   && zip -rq ../../StellarLauncher-win-x64.zip   .)
          (cd publish/linux-x64 && zip -rq ../../StellarLauncher-linux-x64.zip .)

      - name: Derive channel paths + checksums
        run: |
          if [ "${{ steps.ver.outputs.channel }}" = "testing" ]; then
            echo "SUBDIR=launcher/testing" >> "$GITHUB_ENV"
            echo "MANIFEST=launcher-testing.json" >> "$GITHUB_ENV"
          else
            echo "SUBDIR=launcher" >> "$GITHUB_ENV"
            echo "MANIFEST=launcher.json" >> "$GITHUB_ENV"
          fi
          echo "WIN_SHA=$(sha256sum StellarLauncher-win-x64.zip | cut -d' ' -f1)" >> "$GITHUB_ENV"
          echo "LINUX_SHA=$(sha256sum StellarLauncher-linux-x64.zip | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Generate launcher.json (per-OS checksums for self-replace)
        run: |
          cat > launcher.json <<EOF
          {
            "version": "${{ steps.ver.outputs.version }}",
            "date": "$(date -u +%Y-%m-%d)",
            "channel": "${{ steps.ver.outputs.channel }}",
            "windowsUrl": "https://cdn.revette.io/$SUBDIR/StellarLauncher-win-x64.zip",
            "windowsSha256": "$WIN_SHA",
            "linuxUrl": "https://cdn.revette.io/$SUBDIR/StellarLauncher-linux-x64.zip",
            "linuxSha256": "$LINUX_SHA",
            "notes": "Stellar Launcher ${{ steps.ver.outputs.version }} (${{ steps.ver.outputs.channel }})"
          }
          EOF
          cat launcher.json

      - name: Upload to MinIO (stellar bucket — fixed names, current-only)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
        run: |
          aws s3 cp StellarLauncher-win-x64.zip \
            "s3://cdn/$SUBDIR/StellarLauncher-win-x64.zip" \
            --endpoint-url https://757f61fd2bda67f9a3bc7c3b9b8d62e1.r2.cloudflarestorage.com
          aws s3 cp StellarLauncher-linux-x64.zip \
            "s3://cdn/$SUBDIR/StellarLauncher-linux-x64.zip" \
            --endpoint-url https://757f61fd2bda67f9a3bc7c3b9b8d62e1.r2.cloudflarestorage.com
          aws s3 cp launcher.json \
            "s3://cdn/$MANIFEST" \
            --endpoint-url https://757f61fd2bda67f9a3bc7c3b9b8d62e1.r2.cloudflarestorage.com

      # ---- GitHub Release: new-user download page (STABLE channel only), CURRENT VERSION ONLY ----
      - name: Publish GitHub Release (replace current)
        if: ${{ steps.ver.outputs.channel == 'stable' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.ver.outputs.version }}"; TAG="v$VER"
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" \
            StellarLauncher-win-x64.zip StellarLauncher-linux-x64.zip \
            --target "$GITHUB_SHA" \
            --title "Stellar Launcher $VER" \
            --notes "Download the zip for your OS, extract, and run. Existing installs auto-update."

      - name: Prune old GitHub Releases (keep only current)
        if: ${{ steps.ver.outputs.channel == 'stable' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          gh release list --limit 200 --json tagName -q '.[].tagName' \
            | grep -vx "$TAG" \
            | while read -r old; do echo "deleting old release $old"; gh release delete "$old" --cleanup-tag --yes || true; done

      # ---- GitHub PRE-release for RC builds (TESTING channel) so RCs are visible on the
      # Releases page alongside the current stable release. These pre-releases are pruned by
      # the stable "Prune old GitHub Releases (keep only current)" step above — i.e. once a
      # stable release is published, every RC disappears from the Releases page. ----
      - name: Publish GitHub pre-release (testing/RC)
        if: ${{ steps.ver.outputs.channel == 'testing' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.ver.outputs.version }}"; TAG="v$VER"
          gh release delete "$TAG" --cleanup-tag --yes 2>/dev/null || true
          gh release create "$TAG" \
            StellarLauncher-win-x64.zip StellarLauncher-linux-x64.zip \
            --target "$GITHUB_SHA" \
            --title "Stellar Launcher $VER (RC)" \
            --prerelease \
            --notes "Release candidate on the **testing** channel. Opt in via Settings → Update channel → testing. All RCs are removed from this page automatically when a stable release is published."

      - name: Prune old workflow runs (keep only this run)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run list --workflow=release.yml --limit 200 \
            --json databaseId -q '.[].databaseId' \
            | grep -vx "${{ github.run_id }}" \
            | while read -r id; do echo "deleting old run $id"; gh run delete "$id" || true; done
